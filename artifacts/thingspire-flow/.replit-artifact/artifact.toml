kind = "web"
previewPath = "/"
title = "Thingspire Flow"
version = "1.0.0"
id = "artifacts/thingspire-flow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22864
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/thingspire-flow run dev"

[services.env]
PORT = "22864"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/thingspire-flow", "run", "build"]
publicDir = "artifacts/thingspire-flow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
